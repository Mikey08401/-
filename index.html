<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LogicCraft - 命题逻辑自然推理工作台</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #11152a;
      --panel-2: #1a2340;
      --card: #1b2540;
      --text: #e5e7eb;
      --muted: #93a3b8;
      --primary: #4f46e5;
      --accent: #10b981;
      --danger: #ef4444;
      --ring: rgba(99,102,241,.4);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(135deg, #0b1020 0%, #0b1a2e 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(2,6,23,.8);
      border-bottom: 1px solid #2e2f4a;
      position: sticky; top: 0; z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand .logo {
      width: 28px; height: 28px; border-radius: 6px;
      background: conic-gradient(from 90deg, #6ee7b7, #3b82f6, #a78bfa, #6ee7b7);
    }
    .title { font-weight: 700; font-size: 16px; }
    .controls { display: flex; gap: 8px; }

    .container {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 12px;
      padding: 12px;
      width: 100%;
      height: calc(100vh - 60px);
      overflow: hidden;
    }
    @media (max-width: 1100px){
      .container { grid-template-columns: 1fr; height:auto; }
    }

    .panel {
      background: rgba(17,23,42,.95);
      border: 1px solid #2e2f4a;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      min-height: 240px;
    }
    .panel-header { display: flex; justify-content: space-between; align-items: center; padding-bottom:6px; border-bottom:1px solid #2e2f4a; margin-bottom:8px; }
    .panel-header h3 { font-size: 13px; margin:0; color:#e2e8f0; }

    .panel-content { flex: 1; overflow: auto; padding-right: 6px; }

    /* Left: rules + premises */
    #rulesGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .rule-card { background: #0b1220; border:1px solid #2a2f4a; border-radius:8px; padding:8px; text-align:center; cursor: grab; }
    .rule-card:hover { border-color: var(--primary); transform: translateY(-1px); }
    .rule-name { font-family: monospace; font-weight:600; font-size:12px; color:#a5f3fc; }
    .rule-desc { font-size:11px; color:#93a3b8; }

    .premise { background: linear-gradient(135deg, #10b981, #059669); color:white; padding:6px 8px; border-radius:6px; cursor: grab; text-align:left; font-family: monospace; }

    /* Center: Proof area */
    #proofArea { padding: 8px; min-height: 320px; border:1px dashed #2e2f4a; border-radius: 10px; background: rgba(2,6,23,.6); }
    .step { display:flex; align-items:center; padding:6px 8px; border-radius:6px; margin:6px 0; background: rgba(255,255,255,.04); border-left:4px solid #2b2f4a; }
    .step.assumption { border-left-color: var(--accent); background: rgba(245,158,11,.08); }
    .step.error { border-left-color: var(--danger); background: rgba(239,68,68,.08); }
    .step .id { width:54px; text-align:center; font-family: monospace; color:#93c5fd; }
    .step .formula { flex:1; padding:0 8px; font-family: monospace; white-space: pre-wrap; }
    .step .rule { font-family: monospace; padding:0 6px; color:#86efac; }
    .step .refs { font-family: monospace; font-size:12px; color:#a3e635; margin-left:8px; }
    .step .errorMsg { color:#f87171; font-size:12px; margin-left:8px; }

    #dropZone { text-align:center; padding:8px; border:2px dashed #2e2f4a; border-radius:8px; margin-top:8px; color:#93a3b8; }

    /* Right: AI Assistant */
    #aiPanel { display:flex; flex-direction:column; gap:8px; }
    .ai-actions { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .ai-btn { padding:8px; border-radius:6px; border:1px solid #2e2f4a; background:#111827; color:#e5e7eb; cursor:pointer; }
    .ai-response { min-height:120px; padding:10px; border-radius:8px; border:1px solid #2e2f4a; background:#0b1020; color:#e5e7eb; }
    #chatHistory { height:120px; overflow-y:auto; padding:4px 0; }
    .msg { padding:2px 6px; border-radius:6px; margin:4px 0; }
    .user { color:#93c5fd; background: rgba(147,197,253,.15); }
    .ai { color:#e2e8f0; background: rgba(99,102,241,.15); }

    /* Modals */
    .modal { background:#0b1020; border:1px solid #2e2f4a; border-radius:10px; padding:14px; width:420px; max-width:90%; }
    .modal-header { font-weight:700; margin-bottom:8px; }
    .modal .field { margin-bottom:8px; }
    .modal input, .modal select { width:100%; padding:6px 8px; border-radius:6px; border:1px solid #2e2f4a; background:#111827; color:#e5e7eb; }
    .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:8px; }

    /* Buttons */
    .btn { padding:8px 12px; border-radius:6px; border:1px solid #2e2f4a; background:#1f2937; color:#e5e7eb; cursor:pointer; }
    .btn.primary { background: var(--primary); border-color: transparent; color:white; }
    .hint { font-size:12px; color:var(--muted); }

    @media (max-width: 900px) {
      .container { grid-template-columns:1fr; height:auto; }
      #proofArea { min-height: 200px; }
    }

  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo" aria-label="LogicCraft Logo"></div>
      <div class="title">LogicCraft</div>
    </div>
    <div class="controls" aria-label="控制">
      <button id="customBtn" class="btn" title="自定义关卡">自定义关卡</button>
      <button id="guideBtn" class="btn" title="逻辑图鉴">逻辑图鉴</button>
      <button id="resetBtn" class="btn" title="重置当前证明">重置</button>
    </div>
  </header>

  <main class="container" id="main">
    <!-- 左：规则 + 前提 -->
    <section class="panel" id="leftPanel">
      <div class="panel-header"><h3>规则库</h3></div>
      <div class="panel-content" id="rulesPanel">
        <div id="rulesGrid"></div>
      </div>
      <div class="panel-header" style="border-top:1px solid #2e2f4a;"><h3>前提</h3></div>
      <div class="panel-content" id="premisesPanel">
        <div id="premisesList"></div>
      </div>
    </section>

    <!-- 中：推理区 -->
    <section class="panel" id="proofPanel">
      <div class="panel-header">
        <h3>证明区</h3>
        <div id="goalDisplay" class="hint" style="white-space:nowrap;">目标：<span id="goalFormula"></span></div>
      </div>
      <div id="proofArea" aria-label="证明步骤区域"></div>
      <div id="dropZone" title="拖拽规则或前提到这里">拖拽规则或前提到这里</div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button id="closeSubproof" class="btn" title="关闭最近的子证明块">关闭子证明</button>
        <button id="customHint" class="btn" title="帮助提示">提示</button>
      </div>
    </section>

    <!-- 右：AI 助手 -->
    <section class="panel" id="aiPanel">
      <div class="panel-header">
        <h3>AI 助手</h3>
        <span class="hint" id="aiModeLabel">提示/解析</span>
      </div>
      <div class="panel-content" style="display:flex;flex-direction:column;gap:8px;">
        <div class="ai-actions" style="display:flex;gap:6px;">
          <button class="ai-btn" id="hintBtn">提示</button>
          <button class="ai-btn" id="analysisBtn">解析</button>
        </div>
        <div class="ai-response" id="aiResponse">AI 将在这里给出提示与讲解。</div>
        <div id="chat" style="display:flex;flex-direction:column;gap:6px;">
          <div id="chatHistory"></div>
          <div class="ai-input" style="display:flex;gap:6px;">
            <input id="chatInput" placeholder="向 AI 提问..." style="flex:1;padding:8px;border-radius:6px;border:1px solid #2e2f4a;background:#111827;color:#e5e7eb;"/>
            <button id="chatSend" class="btn" style="white-space:nowrap;">发送</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 自定义关卡模态 -->
  <div id="customModal" class="modal-overlay" style="display:none;">
    <div class="modal" role="dialog" aria-label="自定义关卡">
      <div class="modal-header">创建自定义关卡</div>
      <div class="field">
        <label>前提列表（逗号分隔）</label>
        <input id="customPremises" placeholder="如: P→Q, P, Q→R" />
        <div class="hint">支持符号：∧、∨、→、¬ 等，以及 ~, !, not, and, or 的等价表示。</div>
      </div>
      <div class="field">
        <label>目标结论</label>
        <input id="customGoal" placeholder="如: R" />
      </div>
      <div class="modal-actions">
        <button id="customCancel" class="btn">取消</button>
        <button id="customCreate" class="btn primary">创建</button>
      </div>
    </div>
  </div>

  <!-- 规则输入模态 -->
  <div id="ruleModal" class="modal-overlay" style="display:none;">
    <div class="modal" role="dialog" aria-label="规则输入">
      <div class="modal-header" id="modalTitle">输入引用</div>
      <div class="field">
        <label>引用步骤（数字，逗号分隔）</label>
        <input id="refInput" placeholder="如：1,2" />
        <div class="hint" id="refHint">引用目标为已有的步骤ID，前提也可引用。</div>
      </div>
      <div class="field" id="assumpField" style="display:none;">
        <label>假设命题（仅用于新建假设的规则）</label>
        <input id="assumpInput" placeholder="如 P, ¬P, P→Q" />
      </div>
      <div class="field" id="resultField" style="display:block;">
        <label>结果命题</label>
        <input id="resultInput" placeholder="如：Q" />
      </div>
      <div class="modal-actions">
        <button id="modalCancel" class="btn">取消</button>
        <button id="modalConfirm" class="btn primary">确认</button>
      </div>
    </div>
  </div>

  <!-- 逻辑图鉴模态（简单示例） -->
  <div id="guideModal" class="modal-overlay" style="display:none;">
    <div class="modal" role="dialog" aria-label="逻辑图鉴">
      <div class="modal-header">逻辑图鉴</div>
      <div id="guideGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <!-- Cards inserted by JS -->
      </div>
      <div class="modal-actions">
        <button id="guideClose" class="btn">关闭</button>
      </div>
    </div>
  </div>

  <!-- 成功提示 -->
  <div id="successOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;justify-content:center;align-items:center;">
    <div class="modal" style="width:420px;">
      <div class="modal-header">恭喜！完成关卡</div>
      <div id="successText" style="margin:8px 0 12px;">你已完成关卡。</div>
      <div class="modal-actions">
        <button id="successNext" class="btn primary">下一关</button>
      </div>
    </div>
  </div>

  <script>
    // ----------------- 数据 -----------------
    // 6道关卡（按你给的题目顺序实现）
    const PRESET_LEVELS = [
      { id:1, name:'关卡1', premises:['p→q','p','r'], goal:'q∧r' },
      { id:2, name:'关卡2', premises:['p→q','¬q','p∧r'], goal:'¬p' },
      { id:3, name:'关卡3', premises:['p∨q','p→r'], goal:'¬q→r' },
      { id:4, name:'关卡4', premises:['p→q'], goal:'(p∧r)→(q∧r)' },
      { id:5, name:'关卡5', premises:['p→q','¬q'], goal:'¬p∨r' },
      { id:6, name:'关卡6', premises:['p∨q','p→r','¬r'], goal:'q' }
    ];

    // 状态
    let state = {
      nextId: 1,             // 全局唯一ID
      premises: [],            // 当前关卡前提（字符串）
      goal: '',                 // 当前关卡目标
      proof: [],                 // 步骤：{ id, depth, formula, rule, refs, isAssump, isOpenAssump, error }
      depthStack: [],            // 开启的假设块栈：{ depth, type, assumption }
      currentLevel: 0,           // 0..5 对应 PRESET_LEVELS
      completed: JSON.parse(localStorage.getItem('logiccraft_completed') || '{}'), // 关卡完成状态
      customLoaded: false
      // AI 状态可扩展
    };

    // ----------------- helper: 符号规范化 -----------------
    function normalizeFormula(formula) {
      if (!formula) return '';
      let f = formula;
      f = f.replace(/\s+/g, '');
      // 替换常见等价符号
      f = f.replace(/~/g, '¬').replace(/∼/g, '¬');
      f = f.replace(/NOT/gi,'¬').replace(/\bnot\b/gi,'¬');
      f = f.replace(/&/g,'∧').replace(/\band\b/gi,'∧').replace(/\bAnd\b/gi,'∧');
      f = f.replace(/\|/g,'∨').replace(/\bor\b/gi,'∨').replace(/\bOr\b/gi,'∨');
      f = f.replace(/->|→/g,'→');
      // 还原常用的括号书写风格
      return f;
    }

    function stepDepthString(n){ return ' '.repeat(n*2); }

    // 将字符串显示成可比较的“标准”形式
    function canonical(formula){ return normalizeFormula(formula); }

    // --------------- UI 绑定与渲染 ---------------

    // 渲染规则卡
    function renderRules(){
      const grid = document.getElementById('rulesGrid');
      const items = [
        {id:'MP', name:'MP', desc:'→消除'},
        {id:'MT', name:'MT', desc:'否定后件'},
        {id:'AND_I', name:'∧I', desc:'合取引入'},
        {id:'AND_E', name:'∧E', desc:'合取消去'},
        {id:'OR_I', name:'∨I', desc:'析取引入'},
        {id:'OR_E', name:'∨E', desc:'析取消去'},
        {id:'IMPL_I', name:'→I', desc:'蕴含引入', needsSub:true},
        {id:'NOT_I', name:'¬I', desc:'否定引入', needsSub:true},
        {id:'RAA', name:'RAA', desc:'归谬法', needsSub:true},
        {id:'DNE', name:'DNE', desc:'双重否定消除'}
      ];
      grid.innerHTML = items.map(it => `
        <div class="rule-card" draggable="true" data-rule="${it.id}" title="${it.name}">
          <div class="rule-name">${it.name}</div>
          <div class="rule-desc">${it.desc}</div>
        </div>`).join('');
      grid.querySelectorAll('.rule-card').forEach(card => {
        card.addEventListener('dragstart', (e) => {
          const rid = e.currentTarget.dataset.rule;
          e.dataTransfer.setData('text/plain', JSON.stringify({type:'rule', id:rid}));
        });
        card.addEventListener('click', () => openRuleModal(card.dataset.rule));
      });
    }

    // 渲染前提
    function renderPremises(){
      const list = document.getElementById('premisesList');
      list.innerHTML = '';
      if (!state.premises.length){
        list.innerHTML = '<div class="hint" style="color:#93a3b8">暂无前提，请通过拖拽或自定义加载前提。</div>';
        return;
      }
      state.premises.forEach((p, idx) => {
        const el = document.createElement('div');
        el.className = 'premise';
        el.draggable = true;
        el.textContent = `${idx+1}: ${p}`;
        el.style.marginBottom = '6px';
        el.addEventListener('dragstart', (e)=> {
          e.dataTransfer.setData('text/plain', JSON.stringify({type:'premise', id: idx}));
        });
        el.addEventListener('dblclick', ()=> {
          // 双击也可直接添加为新步骤
          addPremiseAsStep(idx);
        });
        list.appendChild(el);
      });
    }

    // 渲染证明区
    function renderProof(){
      const area = document.getElementById('proofArea');
      area.innerHTML = '';
      // 头部信息可选
      state.proof.forEach((st, i) => {
        const d = st.depth || 0;
        const div = document.createElement('div');
        div.className = 'step' + (st.isAssumption ? ' assumption' : '') + (st.error ? ' error' : '');
        div.style.paddingLeft = (d * 18) + 'px';
        div.innerHTML = `
          <span class="id">${st.id}</span>
          <span class="formula" style="flex:1; display:inline-block; min-width:260px;">${st.formula || ''}</span>
          <span class="rule" style="margin-left:6px; font-family: monospace;">${st.rule || ''}</span>
          <span class="refs" title="引用的步号">${(st.refs && st.refs.length) ? st.refs.join(',') : ''}</span>
          ${st.error ? `<span class="errorMsg" style="margin-left:8px; color:#f87171;">${st.error}</span>` : ''}
        `;
        area.appendChild(div);
      });
      // 目标文本
      const g = document.getElementById('goalFormula');
      if (g) g.textContent = state.goal || '';
    }

    // 打开规则输入模态
    let _pendingRuleId = null;
    function openRuleModal(ruleId){
      _pendingRuleId = ruleId;
      const rule = RULES.find(r => r.id === ruleId);
      document.getElementById('refInput').value = '';
      document.getElementById('assumpField').style.display = ruleId==='IMPL_I' || ruleId==='NOT_I' || ruleId==='RAA' ? 'block' : 'none';
      document.getElementById('assumpField').style.display = (ruleId==='IMPL_I' || ruleId==='NOT_I' || ruleId==='RAA') ? 'block' : 'none';
      document.getElementById('resultInput').value = '';
      document.getElementById('ruleModal').style.display = 'flex';
      document.getElementById('refInput').focus();
    }
    function closeRuleModal(){ document.getElementById('ruleModal').style.display = 'none'; _pendingRuleId = null; }

    document.getElementById('modalCancel').addEventListener('click', closeRuleModal);

    // 规则输入提交（简化版：直接使用用户输入的 refs 和 result 生成新步）
    document.getElementById('modalConfirm').addEventListener('click', ()=> {
      if (!_pendingRuleId) return;
      const ruleId = _pendingRuleId;
      const refRaw = document.getElementById('refInput').value.trim();
      const resultRaw = document.getElementById('resultInput').value.trim();
      const refs = refRaw ? refRaw.split(',').map(n => Number(n.trim())).filter(n => !Number.isNaN(n)) : [];
      // 验证引用
      const vis = state.proof.map(p => p.id);
      const okRefs = refs.every(r => vis.includes(r));
      if (!okRefs && refs.length>0){
        alert('引用的步号不存在或不可见，请调整引用。');
        return;
      }
      // 简化：若未输入结果，尝试从规则推断占位结果
      let inferred = null;
      const r = ruleId;
      if (r==='MP' && refs.length===2){
        const f1 = state.proof.find(p=>p.id===refs[0]);
        const f2 = state.proof.find(p=>p.id===refs[1]);
        const m = /(.+?)→(.+)/.exec(f1?.formula||'');
        if (m && normalizeFormula(f2?.formula||'')===normalizeFormula(m[1])) inferred = m[2];
      }
      if (r==='MT' && refs.length===2){
        const f1 = state.proof.find(p=>p.id===refs[0]);
        const f2 = state.proof.find(p=>p.id===refs[1]);
        const m = /(.+?)→(.+)/.exec(f1?.formula||'');
        if (f2?.formula && normalizeFormula(f2.formula) === '¬' + normalizeFormula(m?.[2]||'')){
          inferred = '¬' + (m?.[1]||'');
        }
      }
      if (r==='AND_I' && refs.length===2){
        const A = state.proof.find(p=>p.id===refs[0])?.formula;
        const B = state.proof.find(p=>p.id===refs[1])?.formula;
        inferred = `(${A})∧(${B})`;
      }
      if (r==='DNE'){
        if (state.proof.find(p=>p.id===refs[0])?.formula?.startsWith('¬¬')){
          inferred = state.proof.find(p=>p.id===refs[0]).formula.replace(/^¬¬/,'');
        }
      }
      // 生成新步
      const newFormula = (resultRaw && resultRaw.length>0) ? normalizeFormula(resultRaw) : inferred;
      const newStep = {
        id: state.nextId++,
        depth: currentDepth(),
        formula: newFormula || '',
        rule: (r) ? (ruleIdToName(r)) : 'Premise',
        refs: refs,
        isAssumption: false
      };
      state.proof.push(newStep);
      renderProof();
      closeRuleModal();
      // 关卡完成判定（简化：若最终公式等于目标且非直接假设，即通关）
      if (normalizeFormula(newFormula) === normalizeFormula(state.goal)) {
        showSuccess();
      }
    });

    // 将规则ID映射成显示名称
    function ruleIdToName(id){
      const map = {
        'MP':'MP','MT':'MT','AND_I':'∧I','AND_E':'∧E','OR_I':'∨I','OR_E':'∨E','IMPL_I':'→I','NOT_I':'¬I','RAA':'RAA','DNE':'DNE'
      };
      return map[id] || id;
    }

    // 打开自定义模态
    document.getElementById('customBtn').addEventListener('click', ()=> {
      document.getElementById('customModal').style.display = 'flex';
      document.getElementById('customPremises').value = '';
      document.getElementById('customGoal').value = '';
    });

    document.getElementById('customCancel').addEventListener('click', ()=> {
      document.getElementById('customModal').style.display = 'none';
    });

    function loadCustomLevel(premises, goal){
      state.premises = premises;
      state.goal = goal;
      state.proof = [];
      renderPremises();
      renderProof();
      updateGoalDisplay();
    }
    document.getElementById('customCreate')?.addEventListener('click', ()=> {
      const premises = document.getElementById('customPremises').value.trim();
      const goal = document.getElementById('customGoal').value.trim();
      if (!premises || !goal) {
        alert('请填写前提与目标');
        return;
      }
      const pArr = premises.split(',').map(s => s.trim()).filter(Boolean);
      state.premises = pArr;
      state.goal = goal;
      state.proof = [];
      renderPremises();
      renderProof();
      updateGoalDisplay();
      document.getElementById('customModal').style.display = 'none';
    });

    // 逻辑图鉴与辅助
    function openGuide(){
      // 简单展示
      alert('逻辑图鉴：MP、MT、∧I、∧E、∨I、∨E、→I、¬I、RAA、DNE 的要点概览。');
    }

    // 初始绑定
    window.addEventListener('load', ()=>{
      renderRules();
      renderPremises();
      renderProof();
      // 关卡加载
      const idx = 0; // 从关卡1开始
      state.currentLevel = idx;
      const base = PRESET_LEVELS[idx];
      if (base){
        state.premises = base.premises.slice();
        state.goal = base.goal;
        renderPremises();
        renderProof();
        updateGoalDisplay();
      }
      // 事件
      document.getElementById('guideBtn').addEventListener('click', openGuide);
      document.getElementById('resetBtn').addEventListener('click', ()=> {
        if (confirm('确定重置当前证明？')) {
          state.proof = [];
          state.depthStack = [];
          renderProof();
        }
      });
      setupAI();
    });

    // AI 简易
    function setupAI(){
      document.getElementById('hintBtn').addEventListener('click', ()=>{
        document.getElementById('aiResponse').textContent = '提示：优先考虑 MP、MT、∧I 的基础推导，逐步构造子证明。';
      });
      document.getElementById('analysisBtn').addEventListener('click', ()=>{
        document.getElementById('aiResponse').textContent = '分析：当前推导需要保证引用只在外层可见，子证明内的引用需与外层来源对齐。';
      });
      document.getElementById('chatSend')?.addEventListener('click', ()=>{
        const v = document.getElementById('chatInput');
        const txt = v.value.trim();
        if (!txt) return;
        const hist = document.getElementById('chatHistory');
        hist.innerHTML += `<div class="msg user">${txt}</div>`;
        v.value = '';
        hist.innerHTML += `<div class="msg ai">AI: 这只是一个演示响应。继续你的推理吧。</div>`;
        hist.scrollTop = hist.scrollHeight;
      });
    }

    // 通用：关闭全部模态（快捷按钮等）
    function showSuccess(){
      const overlay = document.getElementById('successOverlay');
      overlay.style.display = 'flex';
    }
  </script>
</body>
</html>
